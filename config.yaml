# Overflayer config
server:
  host: localhost
  port: 25565
  version: auto

snippet_dirs:
  - path: ./snippets
    writable: true
  - path: ./tmp/local_snippets
    writable: true

# Infrastructure behaviors loaded on every bot at startup.
# Task behaviors (follow, talk, equip, gather, build) are loaded on-demand.
_defaults: &defaults
  auth: offline
  load:
    - snippets/navigate.js
    - snippets/eat.js
    - snippets/look.js

players:
  - { username: January,   <<: *defaults }
  - { username: February,  <<: *defaults }
  - { username: March,     <<: *defaults }
  - { username: April,     <<: *defaults }
  - { username: May,       <<: *defaults }
  - { username: June,      <<: *defaults }
  - { username: July,      <<: *defaults }
  - { username: August,    <<: *defaults }
  - { username: September, <<: *defaults }
  - { username: October,   <<: *defaults }
  - { username: November,  <<: *defaults }
  - { username: December,  <<: *defaults }
